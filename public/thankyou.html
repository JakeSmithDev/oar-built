<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — OAR Built</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --coal: #0C0C0C;
    --charcoal: #1A1A1A;
    --copper: #C87941;
    --copper-light: #D4915E;
    --cream: #F0EDE8;
    --ash: #8A8A8A;
    --copper-glow: rgba(200, 121, 65, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--coal); color: var(--cream);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--copper-glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .content { position: relative; z-index: 2; }
  .logo-img { height: 50px; width: auto; margin-bottom: 3rem; }
  .check {
    width: 64px; height: 64px; border: 2px solid var(--copper);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 2rem;
  }
  .check svg { width: 28px; height: 28px; }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 400; margin-bottom: 1rem; line-height: 1.15;
  }
  h1 em { font-style: italic; color: var(--copper); }
  p { color: var(--ash); font-size: 1.1rem; line-height: 1.7; max-width: 480px; margin: 0 auto 2.5rem; }
  .btn {
    display: inline-block; padding: 1rem 2.5rem;
    background: var(--copper); color: var(--coal);
    text-decoration: none; font-weight: 600; font-size: 0.85rem;
    letter-spacing: 1.5px; text-transform: uppercase;
    border: none; cursor: pointer; transition: all 0.3s;
  }
  .btn:hover {
    background: var(--copper-light); transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(200, 121, 65, 0.25);
  }
</style>
</head>
<body>
<div class="content">
  <img src="logo.svg" alt="OAR Built" class="logo-img">
  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#C87941" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>Message <em>received.</em></h1>
  <p>Thanks for reaching out. We'll review your inquiry and get back to you within one business day.</p>
  <a href="/" class="btn">Back to Home</a>
</div>
</body>
</html>
