<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — OAR Built</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --coal: #0C0C0C;
    --charcoal: #1A1A1A;
    --copper: #C87941;
    --copper-light: #D4915E;
    --cream: #F0EDE8;
    --ash: #8A8A8A;
    --slate: #4A4A4A;
    --copper-glow: rgba(200, 121, 65, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--coal); color: var(--cream);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--copper-glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .content { position: relative; z-index: 2; }
  .logo-img { height: 50px; width: auto; margin-bottom: 3rem; }
  .error-code {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(5rem, 15vw, 10rem);
    color: var(--copper); line-height: 1; margin-bottom: 1rem;
    opacity: 0.2;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 400; margin-bottom: 1rem; line-height: 1.15;
  }
  p {
    color: var(--ash); font-size: 1rem; line-height: 1.7;
    max-width: 420px; margin: 0 auto 2.5rem;
  }
  .actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-block; padding: 0.9rem 2rem;
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 600; font-size: 0.8rem;
    letter-spacing: 1.5px; text-transform: uppercase;
    text-decoration: none; cursor: pointer; transition: all 0.3s;
  }
  .btn-primary {
    background: var(--copper); color: var(--coal); border: none;
  }
  .btn-primary:hover {
    background: var(--copper-light); transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(200, 121, 65, 0.25);
  }
  .btn-secondary {
    background: transparent; color: var(--cream);
    border: 1px solid var(--slate);
  }
  .btn-secondary:hover {
    border-color: var(--cream); background: rgba(255,255,255,0.04);
  }
</style>
</head>
<body>
<div class="content">
  <img src="/logo.png" alt="OAR Built" class="logo-img">
  <div class="error-code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">Back to Home</a>
    <a href="/#contact" class="btn btn-secondary">Contact Us</a>
  </div>
</div>
</body>
</html>
